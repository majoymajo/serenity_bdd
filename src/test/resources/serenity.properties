# Configuración de Serenity BDD para OpenCart E2E Tests

# Driver web
webdriver.driver=chrome
webdriver.base.url=http://opencart.abstracta.us/

# Chrome options - Headless mode (optimizado para CI/CD y ejecutabilidad robusta)
# Mode 1: Headless (para servidores y CI/CD)
chrome.switches=--headless=new,--no-sandbox,--disable-dev-shm-usage,--start-maximized

# Mode 2: Descomenta para modo visible (desarrollo local):
# chrome.switches=--start-maximized

# Opciones adicionales
chrome.options.disable-extensions
chrome.options.incognito

# Timeouts
webdriver.timeouts.implicitly.wait=10
webdriver.wait.for.timeout=5000

# Screenshots
serenity.take.screenshots=for_each_action
serenity.screenshot.height=1024
serenity.screenshot.width=1280

# Reports
serenity.report.encoding=UTF-8
serenity.test.root=com.sofka.opencart

# Logging
serenity.logging=NORMAL
logging.level=NORMAL

# Narrativa
serenity.narrative.text.size=normal
serenity.narrative.icons=diamond

# Video recording (opcional, descomenta para habilitar)
# serenity.record.video.mode=all

# Paralelización (opcional, descomenta para habilitar)
# serenity.parallel.tests=true
# webdriver.parallel.threads=4

# WebDriver Manager auto-setup de ChromeDriver
# Sin necesidad de configuración explícita - se descarga automáticamente
