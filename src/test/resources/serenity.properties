# Configuración de Serenity BDD para OpenCart E2E Tests

# Driver web - Using Microsoft Edge instead of Chrome
webdriver.driver=edge
webdriver.base.url=http://opencart.abstracta.us/

# Specify Edge binary path directly (avoid WebDriverManager download)
webdriver.edge.driver=C:\\Program Files (x86)\\Microsoft\\Edge\\Application\\msedge.exe

# Edge options - Simplified configuration for stability
edge.switches=--disable-gpu,--window-size=1920,1080

# Disable WebDriverManager for Edge (use system Edge)
webdriver.manager.edgedriver.cache=false

# WebDriver configuration
webdriver.capabilities.acceptInsecureCerts=true
webdriver.capabilities.pageLoadStrategy=normal

# Timeouts - increased for stability
webdriver.timeouts.implicitly.wait=20
webdriver.wait.for.timeout=15000
webdriver.edge.driver.timeout=60

# WebDriver remote settings
webdriver.remote.timeout=60
webdriver.remote.connection.timeout=60

# Screenshots configuration
serenity.take.screenshots=for_each_action
serenity.screenshot.height=1080
serenity.screenshot.width=1920

# Reports
serenity.report.encoding=UTF-8
serenity.test.root=com.sofka.opencart
serenity.reports.show.step.details=true

# Logging
serenity.logging=QUIET
logging.level=WARN

